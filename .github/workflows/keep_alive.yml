name: Keep Alive

on:
  schedule:
    - cron: '0 0 * * 0'  # Chạy mỗi Chủ nhật 7h sáng (UTC+7)
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Keep repo active
        run: |
          git config user.email "bot@morning.bot"
          git config user.name "Morning Bot"
          git commit --allow-empty -m "chore: keep alive $(date '+%Y-%m-%d')"
          git push
