name: 8h sáng - Quote buổi sáng

on:
  schedule:
    - cron: '0 1 * * *'  # 8h sáng giờ Việt Nam (UTC+7)
  workflow_dispatch:      # Cho phép chạy thủ công để test

jobs:
  send-quote:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install requests

      - name: Install Tempo CLI
        run: |
          curl -fsSL https://tempo.xyz/install | bash || true
          ~/.tempo/bin/tempoup --unsafe-skip-verify || true

      - name: Configure Tempo Wallet
        run: |
          mkdir -p ~/.tempo/wallet
          printf '[rpc]\n[telemetry]\nenabled = false\n' > ~/.tempo/config.toml
          echo "$TEMPO_KEYS_TOML" > ~/.tempo/wallet/keys.toml
        env:
          TEMPO_KEYS_TOML: ${{ secrets.TEMPO_KEYS_TOML }}

      - name: Gửi quote buổi sáng
        run: python scripts/send_quote.py
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
